<div class="form-shell">
  <div class="form-card">
    <header class="page-header">
      <div>
        <p class="eyebrow">Create Employee</p>
        <h2>Add a New Employee</h2>
      </div>
    </header>

    <form class="employee-form" (ngSubmit)="onSubmit()" #employeeForm="ngForm">
      <div class="grid">
          <label>
            <span>Username</span>
            <input type="text" name="username" [(ngModel)]="employee.username" required />
          </label>
          <label>
            <span>First Name</span>
            <input type="text" name="firstName" [(ngModel)]="employee.firstName" required />
          </label>
          <label>
            <span>Last Name</span>
            <input type="text" name="lastName" [(ngModel)]="employee.lastName" required />
          </label>
          <label>
            <span>Email</span>
            <input type="email" name="email" [(ngModel)]="employee.email" required />
          </label>
          <label>
            <span>Birth Date</span>
            <input type="datetime-local" name="birthDate" [(ngModel)]="employee.birthDate" [max]="today + 'T23:59'" required />
          </label>
          <label>
            <span>Basic Salary</span>
            <input type="number" name="basicSalary" [(ngModel)]="employee.basicSalary" required />
          </label>
          <label>
            <span>Status</span>
            <select name="status" [(ngModel)]="employee.status" required>
              <option value="Active">Active</option>
              <option value="Inactive">Inactive</option>
              <option value="On Leave">On Leave</option>
            </select>
          </label>
      </div>

      <label class="full-width">
        <span>Group</span>
        <div class="dropdown">
          <input type="text" [ngModel]="employee.group" (ngModelChange)="groupFilter = $event" name="groupInput" (focus)="toggleGroupDropdown()" placeholder="Select group" />
          <button type="button" class="dropdown-toggle" (click)="toggleGroupDropdown()" [attr.aria-label]="'Toggle group dropdown'">▾</button>
          <div class="dropdown-menu" *ngIf="showGroupDropdown">
            <input type="text" placeholder="Search group" [(ngModel)]="groupFilter" name="groupFilter" [attr.aria-label]="'Search groups'" />
            <button type="button" *ngFor="let group of filteredGroups" (click)="selectGroup(group)" [attr.aria-label]="'Select group ' + group">{{ group }}</button>
          </div>
        </div>
      </label>

      <label class="full-width">
        <span>Description (datetime)</span>
        <input type="datetime-local" name="description" [(ngModel)]="employee.description" required />
      </label>

      <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

      <div class="actions">
        <button type="submit" class="primary-btn">Save</button>
        <button type="button" class="secondary-btn" (click)="cancel()">Cancel</button>
      </div>
    </form>
  </div>
</div>
