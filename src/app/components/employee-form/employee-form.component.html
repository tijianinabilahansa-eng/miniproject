<div class="form-shell">
  <div class="form-card">
    <header class="page-header">
      <div>
        <p class="eyebrow">Create Employee</p>
        <h2>Add a New Employee</h2>
      </div>
    </header>

    <form class="employee-form" (ngSubmit)="onSubmit()" #employeeForm="ngForm">
      <div class="grid">
        <label>
          <span>First Name</span>
          <input type="text" name="firstName" [(ngModel)]="employee.firstName" required />
        </label>
        <label>
          <span>Last Name</span>
          <input type="text" name="lastName" [(ngModel)]="employee.lastName" required />
        </label>
        <label>
          <span>Email</span>
          <input type="email" name="email" [(ngModel)]="employee.email" required />
        </label>
        <label>
          <span>Phone</span>
          <input type="text" name="phone" [(ngModel)]="employee.phone" required />
        </label>
        <label>
          <span>Birth Date</span>
          <input type="date" name="birthDate" [(ngModel)]="employee.birthDate" [max]="today" required />
        </label>
        <label>
          <span>Hire Date</span>
          <input type="date" name="hireDate" [(ngModel)]="employee.hireDate" required />
        </label>
        <label>
          <span>Basic Salary</span>
          <input type="number" name="basicSalary" [(ngModel)]="employee.basicSalary" required />
        </label>
        <label>
          <span>Position</span>
          <input type="text" name="position" [(ngModel)]="employee.position" required />
        </label>
      </div>

      <label class="full-width">
        <span>Group</span>
        <div class="dropdown">
          <input type="text" [ngModel]="employee.group" (ngModelChange)="groupFilter = $event" name="groupInput" (focus)="toggleGroupDropdown()" placeholder="Select group" />
          <button type="button" class="dropdown-toggle" (click)="toggleGroupDropdown()">▾</button>
          <div class="dropdown-menu" *ngIf="showGroupDropdown">
            <input type="text" placeholder="Search group" [(ngModel)]="groupFilter" name="groupFilter" />
            <button type="button" *ngFor="let group of filteredGroups" (click)="selectGroup(group)">{{ group }}</button>
          </div>
        </div>
      </label>

      <label class="full-width">
        <span>Address</span>
        <textarea name="address" [(ngModel)]="employee.address" required></textarea>
      </label>

      <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

      <div class="actions">
        <button type="submit" class="primary-btn">Save</button>
        <button type="button" class="secondary-btn" (click)="cancel()">Cancel</button>
      </div>
    </form>
  </div>
</div>
