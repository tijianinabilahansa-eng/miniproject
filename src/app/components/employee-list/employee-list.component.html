<div class="page-shell">
  <header class="page-header">
    <div>
      <p class="eyebrow">Employee Management</p>
      <h2>Employee Directory</h2>
    </div>
    <button type="button" class="primary-btn" (click)="goToAddEmployee()" [attr.aria-label]="'Add Employee'">Add Employee</button>
  </header>

  <div class="toolbar">
    <div class="search-group">
      <input type="text" placeholder="Search by username, name or email" [(ngModel)]="searchTerm" (ngModelChange)="onSearch()" />
      <input type="text" placeholder="Filter by group" [(ngModel)]="searchGroup" (ngModelChange)="onSearch()" />
      <input type="text" placeholder="Filter by status" [(ngModel)]="searchStatus" (ngModelChange)="onSearch()" />
    </div>
    <label class="page-size">
      <span>Rows per page</span>
      <select [(ngModel)]="pageSize" (change)="currentPage = 1; applyFilters()">
        <option [ngValue]="10">10</option>
        <option [ngValue]="20">20</option>
        <option [ngValue]="50">50</option>
      </select>
    </label>
  </div>

  <div class="alert" *ngIf="alertMessage" [ngClass]="alertType" role="status" aria-live="polite">
    {{ alertMessage }}
  </div>

  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th (click)="sortBy('firstName')">Name</th>
          <th (click)="sortBy('email')">Email</th>
          <th (click)="sortBy('group')">Group</th>
          <th (click)="sortBy('status')">Status</th>
          <th (click)="sortBy('basicSalary')">Salary</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let employee of visibleEmployees">
          <td>
            <button type="button" class="link-btn" (click)="openDetail(employee.id)" [attr.aria-label]="'View details for ' + employee.username">{{ employee.username }} — {{ employee.firstName }} {{ employee.lastName }}</button>
          </td>
          <td>{{ employee.email }}</td>
          <td>{{ employee.group }}</td>
          <td>{{ employee.status }}</td>
          <td>{{ employee.basicSalary | currency:'IDR':'symbol':'1.0-0' }}</td>
          <td>
            <div class="action-group">
              <button type="button" class="action-btn warning" (click)="triggerEdit(employee)" [attr.aria-label]="'Edit ' + employee.username">Edit</button>
              <button type="button" class="action-btn danger" (click)="triggerDelete(employee)" [attr.aria-label]="'Delete ' + employee.username">Delete</button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="pagination">
    <button type="button" (click)="prevPage()" [disabled]="currentPage === 1">Previous</button>
    <span>Page {{ currentPage }} of {{ totalPages }}</span>
    <button type="button" (click)="nextPage()" [disabled]="currentPage === totalPages">Next</button>
  </div>
</div>
